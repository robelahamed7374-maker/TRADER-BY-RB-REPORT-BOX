⚙ SETTINGS

</button>

<button
class="media"

class="all"

onclick="allReset()">

</button>

<a href="index.html">

</a>

<script>

function reset(x){

localStorage
.removeItem(x);

alert(

x+

" deleted"

);

}

function allReset(){

localStorage
.clear();

alert(

"All Deleted"

);

}

</script>
