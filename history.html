<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>History Box</title>

<style>

body{
background:#000;
margin:0;
color:white;
font-family:Arial;
}

.wrap{
padding:20px;
}

.box{
background:#071136;
padding:20px;
border-radius:25px;
box-shadow:0 0 40px #7a00ff;
}

h1{
color:#9d4dff;
}

input,
textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:15px;

background:#101010;
color:white;

border:none;
border-radius:12px;
}

button{
width:100%;
padding:18px;

border:none;

border-radius:14px;

font-size:20px;

background:
linear-gradient(
90deg,
#7a00ff,
#9d4dff,
#ffffff
);

}

.item{

background:#111;

padding:15px;

margin-top:15px;

border-radius:15px;

}

.del{

background:red;

margin-top:10px;

}

</style>

</head>

<body>

<div class="wrap">

<div class="box">

<h1>🕘 History Box</h1>

<input
id="title"
placeholder="Setup Title"
>

<textarea
id="txt"
rows="6"
placeholder="ইতিহাস লিখো..."
></textarea>

<button onclick="save()">
SAVE
</button>

</div>

<div id="list"></div>

<br>

<center>

<a href="index.html">

← Dashboard

</a>

</center>

</div>

<script>

load()

function save(){

let data={

title:
document
.getElementById("title")
.value,

txt:
document
.getElementById("txt")
.value

}

let all=

JSON.parse(

localStorage
.getItem(
"history"
)

||"[]"

)

all.unshift(data)

localStorage.setItem(

"history",

JSON.stringify(all)

)

load()

}

function del(i){

let all=

JSON.parse(

localStorage
.getItem(
"history"
)

)

all.splice(i,1)

localStorage.setItem(

"history",

JSON.stringify(all)

)

load()

}

function load(){

let list=

document
.getElementById(
"list"
)

list.innerHTML=""

let all=

JSON.parse(

localStorage
.getItem(
"history"
)

||"[]"

)

all.forEach((x,i)=>{

list.innerHTML+=`

<div class=item>

<h3>

${x.title}

</h3>

<p>

${x.txt}

</p>

<button
class=del
onclick="del(${i})"
>

DELETE

</button>

</div>

`

})

}

</script>

</body>

</html>
