<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>History</title>

<style>

body{
background:#030303;
color:white;
padding:20px;
font-family:sans-serif;
}

.box{

background:#0c1229;

padding:20px;

border-radius:25px;

box-shadow:
0 0 25px gold;

}

.item{

background:#111;

padding:16px;

margin-top:15px;

border-radius:18px;

}

button{

width:100%;

padding:14px;

margin-top:10px;

border:none;

border-radius:14px;

background:red;

color:white;

}

a{

display:block;

text-align:center;

margin-top:20px;

color:white;

}

</style>

</head>

<body>

<div class="box">

<h1>

🏆 History

</h1>

<div id="all">

</div>

</div>

<a href="index.html">

← Dashboard

</a>

<script>

function load(){

let html="";

let notes=

JSON.parse(
localStorage.getItem(
"notes"
)
)||[];

let media=

JSON.parse(
localStorage.getItem(
"media"
)
)||[];

notes.forEach(

(x)=>{

html+=`

<div class=item>

<h3>

📝 NOTE

</h3>

<p>

${x.title||""}

</p>

<p>

${x.note||""}

</p>

</div>

`;

}

);

media.forEach(

(x)=>{

html+=`

<div class=item>

<h3>

🖼 MEDIA

</h3>

<p>

${x.text||""}

</p>

<p>

${x.video||""}

</p>

</div>

`;

}

);

if(html===""){

html=

`

<div class=item>

No History

</div>

`;

}

document
.getElementById(
"all"
)

.innerHTML=

html;

}

load();

</script>

</body>

</html>
