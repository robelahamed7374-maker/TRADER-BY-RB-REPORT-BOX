<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#02061a;
color:white;
font-family:sans-serif;
padding:20px;
}

.box{
background:#0d1545;
padding:20px;
border-radius:20px;
box-shadow:0 0 35px #4450ff;
}

h1{
font-size:40px;
}

input,
select,
textarea{

width:100%;
margin-top:15px;

padding:18px;

background:#161f59;

border:none;

color:white;

border-radius:12px;

box-sizing:border-box;

}

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:15px;

font-size:20px;

background:#6958ff;

color:white;

}

.back{

display:block;

margin-top:20px;

text-align:center;

color:white;

text-decoration:none;

}

</style>

</head>

<body>

<div class="box">

<h1>📊 Trading Setup</h1>

<input placeholder="Setup Name">

<select>

<option>OTC</option>

<option>Real Market</option>

</select>

<input placeholder="Pair">

<input placeholder="Win Rate">

<textarea rows="6"
placeholder="Notes / Strategy"></textarea>

<input type="file">

<button>
Save Setup
</button>

</div>

<a
href="index.html"
class="back">

← Dashboard

</a>

</body>

</html>
