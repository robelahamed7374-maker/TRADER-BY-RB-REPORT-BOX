<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>RB Trading Box</title>

<style>

body{

background:#020202;

padding:20px;

font-family:sans-serif;

color:white;

}

.box{

background:#08102b;

padding:22px;

border-radius:25px;

box-shadow:
0 0 25px #00ff66;

}

h1{

color:#ffd000;

}

input,
textarea{

width:100%;

margin-top:12px;

padding:16px;

background:#161616;

border:none;

border-radius:14px;

color:white;

box-sizing:border-box;

}

textarea{

height:120px;

}

button{

width:100%;

margin-top:20px;

padding:18px;

border:none;

border-radius:15px;

font-size:20px;

background:

linear-gradient(
90deg,
green,
yellow,
red
);

}

.result{

margin-top:25px;

background:#121212;

padding:18px;

border-radius:15px;

}

a{

display:block;

margin-top:20px;

text-align:center;

color:white;

}

</style>

</head>

<body>

<div class="box">

<h1>

📊 Trading Setup

</h1>

<input
id="title"
placeholder="Setup Name">

<textarea
id="notes"
placeholder="ট্রেডিং নোট লিখো">

</textarea>

<input
id="video"
placeholder="ভিডিও লিংক লিখো">

<textarea
id="photo"

placeholder="ছবি সম্পর্কে লিখো">

</textarea>

<input
type="file">

<button
onclick="saveData()">

SAVE

</button>

<div
class="result"
id="show">

কিছু সেভ হয়নি

</div>

</div>

<a
href="index.html">

← Dashboard

</a>

<script>

function saveData(){

let title=
document
.getElementById(
"title"
).value;

let notes=
document
.getElementById(
"notes"
).value;

let video=
document
.getElementById(
"video"
).value;

let photo=
document
.getElementById(
"photo"
).value;

localStorage.setItem(
"setup",

JSON.stringify({

title,

notes,

video,

photo

})

);

load();

}

function load(){

let data=
JSON.parse(

localStorage
.getItem(
"setup"
)

);

if(!data)return;

document
.getElementById(
"show"
)

.innerHTML=

`
<h3>${data.title}</h3>

<p>${data.notes}</p>

<p>${data.video}</p>

<p>${data.photo}</p>

`;

}

load();

</script>

</body>

</html>
