```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
RB Reports
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#02050d;

color:white;

padding:20px;

}

.box{

background:#08112c;

padding:20px;

border-radius:25px;

box-shadow:
0 0 35px #00ff55;

}

h1{

color:#ffe600;

margin-bottom:20px;

}

input,
textarea,
select{

width:100%;

padding:16px;

margin-bottom:15px;

background:#111;

border:none;

border-radius:14px;

color:white;

}

textarea{

height:150px;

}

button{

width:100%;

padding:18px;

margin-top:10px;

border:none;

border-radius:16px;

font-size:20px;

background:

linear-gradient(
90deg,
green,
yellow,
red
);

}

.search{

background:#0088ff;

}

.reset{

background:red;

}

.card{

background:#111;

padding:18px;

margin-top:20px;

border-radius:20px;

}

.card img{

width:100%;

border-radius:15px;

margin-top:10px;

}

.del{

background:red;

}

a{

display:block;

text-align:center;

margin-top:20px;

color:white;

}

</style>

</head>

<body>

<div class="box">

<h1>

📊 Trading Reports

</h1>

<input
id="setup"

placeholder="Setup Name">

<select
id="market">

<option>
OTC
</option>

<option>
Real Market
</option>

</select>

<input
id="pair"

placeholder="Pair">

<input
id="win"

placeholder="Win Rate">

<textarea
id="note"

placeholder="Strategy লিখো">

</textarea>

<input
id="video"

placeholder="Video Link">

<input
id="photo"

placeholder="Photo Description">

<input
type="file"

id="img">

<button
onclick="save()">

SAVE

</button>

<input
id="search"

placeholder="Search">

<button
class="search"

onclick="find()">

SEARCH

</button>

<button
class="reset"

onclick="resetAll()">

RESET REPORTS

</button>

<div
id="saved">

</div>

</div>

<a href="index.html">

← Dashboard

</a>

<script>

let preview=""

img.onchange=(e)=>{

let file=
e.target.files[0]

if(!file)
return

let reader=
new FileReader()

reader.onload=()=>{

preview=
reader.result

}

reader.readAsDataURL(
file
)

}

function save(){

let data={

setup:
setup.value,

market:
market.value,

pair:
pair.value,

win:
win.value,

note:
note.value,

video:
video.value,

photo:
photo.value,

img:
preview

}

let all=

JSON.parse(

localStorage
.getItem(
"reports"
)

||"[]"

)

all.unshift(data)

localStorage
.setItem(

"reports",

JSON.stringify(all)

)

render()

}

function del(i){

let all=

JSON.parse(

localStorage
.getItem(
"reports"
)

)

all.splice(i,1)

localStorage.setItem(

"reports",

JSON.stringify(all)

)

render()

}

function render(q=""){

saved.innerHTML=""

let all=

JSON.parse(

localStorage
.getItem(
"reports"
)

||"[]"

)

all

.filter(

x=>

x.setup

.toLowerCase()

.includes(

q

.toLowerCase()

)

)

.forEach(

(x,i)=>{

saved.innerHTML+=`

<div class=card>

<h2>

${x.setup}

</h2>

<p>

${x.market}

</p>

<p>

${x.pair}

</p>

<p>

${x.win}

%

</p>

<p>

${x.note}

</p>

<p>

${x.photo}

</p>

${
x.video

?

`
<a
href=

"${x.video}"

target=_blank>

▶ VIDEO

</a>
`

:

""

}

${
x.img

?

`

<img
src=
"${x.img}"

>

`

:

""

}

<button
class=del
onclick=

del(${i})

>

DELETE

</button>

</div>

`

}

)

}

function find(){

render(

search.value

)

}

function resetAll(){

localStorage
.removeItem(
"reports"
)

render()

}

render()

</script>

</body>

</html>
```
