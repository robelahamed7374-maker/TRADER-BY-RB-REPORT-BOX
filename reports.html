```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Trading Reports</title>

<style>

body{
background:#020202;
padding:20px;
color:white;
font-family:sans-serif;
}

.box{
background:#09112b;
padding:20px;
border-radius:25px;
box-shadow:0 0 35px #00ff66;
}

input,
textarea{

width:100%;
padding:16px;
margin-top:14px;

background:#141414;

border:none;

border-radius:14px;

color:white;

box-sizing:border-box;

}

textarea{

height:120px;

}

button{

width:100%;

padding:18px;

margin-top:18px;

border:none;

border-radius:16px;

background:

linear-gradient(
90deg,
green,
yellow,
red
);

}

.card{

background:#111;

padding:18px;

margin-top:18px;

border-radius:18px;

}

.del{
background:red;
}

img{
width:100%;
margin-top:10px;
border-radius:12px;
}

a{

display:block;

margin-top:20px;

text-align:center;

color:white;

}

</style>

</head>

<body>

<div class="box">

<h1>

📊 Reports

</h1>

<input
id="setup"

placeholder="Setup Name">

<textarea
id="note"

placeholder="Strategy লিখো">

</textarea>

<input
id="video"

placeholder="ভিডিও লিংক">

<textarea
id="desc"

placeholder="ছবির নোট">

</textarea>

<button
onclick="save()">

SAVE REPORT

</button>

<div id="list">

</div>

</div>

<a href="index.html">

← Dashboard

</a>

<script>

let data=

JSON.parse(
localStorage
.getItem(
"reports"
)

)||[];

function save(){

let setup=
setupInput.value;

let note=
noteInput.value;

let video=
videoInput.value;

let desc=
descInput.value;

data.push({

setup,

note,

video,

desc

});

localStorage
.setItem(

"reports",

JSON.stringify(
data

)

);

render();

}

function remove(i){

data.splice(
i,
1
);

localStorage
.setItem(

"reports",

JSON.stringify(
data

)

);

render();

}

function render(){

let html="";

data.forEach(

(x,i)=>{

html+=`

<div class=card>

<h3>

${x.setup}

</h3>

<p>

${x.note}

</p>

<p>

${x.video}

</p>

<p>

${x.desc}

</p>

<button

class=del

onclick=

remove(${i})

>

DELETE

</button>

</div>

`;

}

);

list.innerHTML=
html;

}

let setupInput=
document.getElementById(
"setup"
);

let noteInput=
document.getElementById(
"note"
);

let videoInput=
document.getElementById(
"video"
);

let descInput=
document.getElementById(
"desc"
);

let list=
document.getElementById(
"list"
);

render();

</script>

</body>

</html>
```
