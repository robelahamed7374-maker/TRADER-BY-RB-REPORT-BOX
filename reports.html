<!DOCTYPE html>

<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>RB Trading Setup</title>

<style>

body{

margin:0;

padding:25px;

background:#020202;

font-family:sans-serif;

color:white;

}

.box{

background:

linear-gradient(
180deg,
#0b0b0b,
#08142b
);

padding:28px;

border-radius:28px;

box-shadow:

0 0 30px #00ff66,
0 0 60px rgba(0,255,120,.2);

}

.title{

font-size:42px;

font-weight:bold;

color:#ffd000;

text-shadow:

0 0 20px #ffd000;

margin-bottom:30px;

}

label{

display:block;

margin-top:18px;

margin-bottom:10px;

color:#9e9e9e;

}

input,
textarea,
select{

width:100%;

padding:18px;

background:#161616;

border:1px solid #2f2f2f;

border-radius:16px;

color:white;

font-size:18px;

box-sizing:border-box;

}

input:focus,
textarea:focus,
select:focus{

outline:none;

border-color:#00ff66;

box-shadow:

0 0 18px #00ff66;

}

textarea{

height:180px;

resize:none;

}

.upload{

padding:18px;

background:#111;

border-radius:16px;

}

.save{

margin-top:25px;

width:100%;

padding:20px;

border:none;

border-radius:20px;

font-size:22px;

font-weight:bold;

background:

linear-gradient(
90deg,
#00ff66,
#ffd000,
#ff2e2e
);

color:black;

}

.save:hover{

box-shadow:

0 0 40px #ffd000;

}

.back{

display:block;

margin-top:25px;

padding:18px;

text-align:center;

background:#141414;

border-radius:16px;

color:white;

text-decoration:none;

}

.back:hover{

box-shadow:

0 0 20px red;

}

</style>

</head>

<body>

<div class="box">

<div class="title">

📊 Trading Setup

</div>

<label>
Setup Name
</label>

<input
placeholder="Ex: Scalping Setup">

<label>
Market
</label>

<select>

<option>
OTC
</option>

<option>
Real Market
</option>

</select>

<label>
Pair
</label>

<input
placeholder="EURUSD">

<label>
Win Rate
</label>

<input
placeholder="85%">

<label>
Strategy Notes
</label>

<textarea
placeholder="সব ট্রেডিং নোট এখানে লিখো">
</textarea>

<label>

Upload Screenshot

</label>

<div class="upload">

<input type="file">

</div>

<button class="save">

SAVE SETUP

</button>

</div>

<a
href="index.html"
class="back">

← Dashboard

</a>

</body>

</html>
