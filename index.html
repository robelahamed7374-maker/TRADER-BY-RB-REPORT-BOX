<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>RB REPORT BOX</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="top">

<h1>📊 RB REPORT BOX</h1>

<p>TOOLS DASHBOARD</p>

</div>


<div class="grid">


<div
class="card report"
onclick="openReport()">

<div class="icon">📝</div>

<h3>Reports</h3>

</div>



<div
class="card media"
onclick="openMedia()">

<div class="icon">🖼️</div>

<h3>Media</h3>

</div>



<div
class="card notes"
onclick="openNotes()">

<div class="icon">📂</div>

<h3>Notes</h3>

</div>



<div
class="card history"
onclick="openHistory()">

<div class="icon">🏆</div>

<h3>History</h3>

</div>



<div
class="card settings"
onclick="openSettings()">

<div class="icon">⚙️</div>

<h3>Settings</h3>

</div>


</div>


<script src="script.js"></script>

</body>

</html>
