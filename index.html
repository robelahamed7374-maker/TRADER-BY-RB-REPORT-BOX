<!DOCTYPE html>

<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
RB SYSTEM
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#02050d;

color:white;

}

.header{

padding:35px;

text-align:center;

}

.header h1{

font-size:48px;

color:#00ff55;

}

.header p{

color:#999;

margin-top:10px;

}

.stats{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:15px;

padding:20px;

}

.stat{

background:#08112c;

padding:20px;

border-radius:20px;

text-align:center;

box-shadow:
0 0 20px rgba(0,255,100,.3);

}

.stat h2{

font-size:34px;

}

.stat p{

font-size:18px;

margin-top:10px;

}

.stat span{

color:#999;

}

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;

padding:20px;

}

.card{

height:190px;

border-radius:25px;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

text-decoration:none;

color:white;

box-shadow:
0 0 35px rgba(255,255,255,.15);

}

.report{

background:
linear-gradient(
135deg,
#00ff44,
#071133
);

}

.media{

background:
linear-gradient(
135deg,
#ff0000,
#071133
);

}

.notes{

background:
linear-gradient(
135deg,
#ffe100,
#071133
);

}

.history{

background:
linear-gradient(
135deg,
#8000ff,
#071133
);

}

.settings{

background:
linear-gradient(
135deg,
gray,
#071133
);

}

.footer{

padding:40px;

text-align:center;

color:#777;

}

@media(max-width:700px){

.grid{

grid-template-columns:
1fr;

}

.stats{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div class="header">

<h1>

RB SYSTEM

</h1>

<p>

Trading Dashboard

</p>

</div>

<div class="stats">

<div class="stat">

<h2>📊</h2>

<p>Reports</p>

<span>Saved Data</span>

</div>

<div class="stat">

<h2>🖼</h2>

<p>Media</p>

<span>Gallery</span>

</div>

<div class="stat">

<h2>📝</h2>

<p>Notes</p>

<span>Storage</span>

</div>

</div>

<div class="grid">

<a
class="card report"
href="reports.html">

📊 Reports

</a>

<a
class="card media"
href="media.html">

🖼 Media

</a>

<a
class="card notes"
href="notes.html">

📝 Notes

</a>

<a
class="card history"
href="history.html">

🏆 History

</a>

<a
class="card settings"
href="settings.html">

⚙ Settings

</a>

</div>

<div class="footer">

© RB SYSTEM

</div>

</body>

</html>
