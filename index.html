<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

RB SYSTEM

</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial;

}

body{

background:#02050d;

color:white;

}

.header{

padding:35px;

text-align:center;

}

.header h1{

font-size:55px;

color:#00ff55;

}

.header p{

color:#888;

margin-top:10px;

}

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:18px;

padding:20px;

}

.card,
.big-card{

display:flex;

align-items:center;

justify-content:center;

height:180px;

border-radius:22px;

text-decoration:none;

color:white;

font-size:28px;

font-weight:bold;

}

.report{

background:
linear-gradient(
135deg,
#00ff55,
#06142d
);

}

.media{

background:
linear-gradient(
135deg,
#ff0000,
#06142d
);

}

.notes{

background:
linear-gradient(
135deg,
#ffd000,
#06142d
);

}

.history{

background:
linear-gradient(
135deg,
#8a00ff,
#06142d
);

}

.settings{

background:
linear-gradient(
135deg,
gray,
#06142d
);

}

.big-card{

background:
linear-gradient(
135deg,
#00ff66,
#06142d
);

}

.footer{

padding:30px;

text-align:center;

color:#666;

}

@media(max-width:700px){

.grid{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div class="header">

<h1>

RB SYSTEM

</h1>

<p>

Trading Dashboard

</p>

</div>

<div class="grid">

<a
class="card report"

href="reports.html">

📊 Reports

</a>


<a
class="card media"

href="media.html">

🖼 Media

</a>


<a
class="card notes"

href="notes.html">

📝 Notes

</a>


<a
class="card history"

href="history.html">

🏆 History

</a>


<a
class="card settings"

href="settings.html">

⚙ Settings

</a>


<a
href="trading.html">

<div class="big-card">

📊 Trading Setup

</div>

</a>

</div>


<div class="footer">

RB SYSTEM

</div>

</body>

</html>
